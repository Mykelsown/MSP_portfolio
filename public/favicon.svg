<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tileDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10141c"/>
      <stop offset="1" stop-color="#090c11"/>
    </linearGradient>
    <linearGradient id="tileLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eceef2"/>
    </linearGradient>
    <style>
      .tile { fill: url(#tileLight); }
      .ring { stroke: #dfe2e8; }
      .mono { fill: #2F6FED; }
      .cursor { fill: #22c55e; }
      @media (prefers-color-scheme: dark) {
        .tile { fill: url(#tileDark); }
        .ring { stroke: #202634; }
        .mono { fill: #5b8def; }
        .cursor { fill: #3ddc84; }
      }
    </style>
  </defs>

  <rect class="tile" x="8" y="8" width="496" height="496" rx="112"/>
  <rect class="ring" x="8" y="8" width="496" height="496" rx="112" fill="none" stroke-width="4"/>

  <!-- SMP monogram, plus a trailing terminal cursor bar -->
  <g transform="translate(256 266)">
    <text
      x="-18" y="58"
      text-anchor="middle"
      font-family="'JetBrains Mono', ui-monospace, 'Courier New', monospace"
      font-weight="700"
      font-size="168"
      letter-spacing="2"
      class="mono"
    >SMP</text>
    <rect class="cursor" x="152" y="-62" width="26" height="128" rx="4"/>
  </g>
</svg>
